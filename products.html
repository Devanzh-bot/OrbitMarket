<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products - OrbitMarket</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">🌍</span>
                <span class="logo-text">OrbitMarket</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="shop.html" class="nav-link">Shop</a></li>
                <li><a href="offers.html" class="nav-link">Special Offers</a></li>
                <li><span class="nav-user" id="userDisplay">Welcome, Cashier!</span></li>
                <li><a href="login.html" class="nav-link" onclick="logout()">Logout</a></li>
            </ul>
        </div>
    </nav>

    <!-- Dashboard Container -->
    <div class="dashboard-container">
        <div class="sidebar">
            <ul class="sidebar-menu">
                <li><a href="dashboard.html" class="sidebar-link">📊 Dashboard</a></li>
                <li><a href="products.html" class="sidebar-link active">📦 Manage Products</a></li>
                <li><a href="checkout.html" class="sidebar-link">🛒 New Bill</a></li>
                <li><a href="index.html" onclick="logout()" class="sidebar-link">🚪 Logout</a></li>
            </ul>
        </div>

        <div class="dashboard-content">
            <h1>Manage Products</h1>

            <!-- Add Product Form -->
            <div class="add-product-section">
                <h2>Add New Product</h2>
                <form id="productForm" class="product-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="productName">Product Name</label>
                            <input type="text" id="productName" placeholder="e.g., Milk" required>
                        </div>
                        <div class="form-group">
                            <label for="productCode">Product Code</label>
                            <input type="text" id="productCode" placeholder="e.g., MILK001" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="productPrice">Price ($)</label>
                            <input type="number" id="productPrice" placeholder="0.00" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label for="productCategory">Category</label>
                            <select id="productCategory" required>
                                <option value="">Select Category</option>
                                <option value="Dairy">Dairy</option>
                                <option value="Groceries">Groceries</option>
                                <option value="Beverages">Beverages</option>
                                <option value="Snacks">Snacks</option>
                                <option value="Frozen">Frozen Foods</option>
                                <option value="Personal Care">Personal Care</option>
                                <option value="Household">Household Items</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="productQuantity">Quantity</label>
                            <input type="number" id="productQuantity" placeholder="Stock quantity" value="1" min="1" required>
                        </div>
                        <div class="form-group">
                            <label for="productDescription">Description</label>
                            <input type="text" id="productDescription" placeholder="Brief description">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">Add Product</button>
                </form>
            </div>

            <!-- Products List -->
            <div class="products-section">
                <h2>Products List</h2>
                <div class="search-bar">
                    <input type="text" id="searchProduct" placeholder="Search products..." class="search-input">
                </div>

                <div id="productsList" class="products-list">
                    <p class="empty-message">No products added yet. Add one using the form above.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Edit Product</h2>
            <form id="editForm" class="product-form">
                <input type="hidden" id="editProductId">
                <div class="form-group">
                    <label for="editProductName">Product Name</label>
                    <input type="text" id="editProductName" required>
                </div>
                <div class="form-group">
                    <label for="editProductCode">Product Code</label>
                    <input type="text" id="editProductCode" required>
                </div>
                <div class="form-group">
                    <label for="editProductPrice">Price ($)</label>
                    <input type="number" id="editProductPrice" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="editProductCategory">Category</label>
                    <select id="editProductCategory" required>
                        <option value="Dairy">Dairy</option>
                        <option value="Groceries">Groceries</option>
                        <option value="Beverages">Beverages</option>
                        <option value="Snacks">Snacks</option>
                        <option value="Frozen">Frozen Foods</option>
                        <option value="Personal Care">Personal Care</option>
                        <option value="Household">Household Items</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editProductQuantity">Quantity</label>
                    <input type="number" id="editProductQuantity" min="1" required>
                </div>
                <div class="form-group">
                    <label for="editProductDescription">Description</label>
                    <input type="text" id="editProductDescription">
                </div>
                <button type="submit" class="btn btn-primary btn-full">Update Product</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Check if user is logged in
        window.addEventListener('load', function() {
            if (!localStorage.getItem('userLoggedIn')) {
                window.location.href = 'login.html';
            }
            loadProducts();
        });

        // Add Product
        document.getElementById('productForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const product = {
                id: Date.now(),
                name: document.getElementById('productName').value,
                code: document.getElementById('productCode').value,
                price: parseFloat(document.getElementById('productPrice').value),
                category: document.getElementById('productCategory').value,
                quantity: parseInt(document.getElementById('productQuantity').value),
                description: document.getElementById('productDescription').value,
                dateAdded: new Date().toLocaleDateString()
            };

            let products = JSON.parse(localStorage.getItem('products')) || [];
            products.push(product);
            localStorage.setItem('products', JSON.stringify(products));

            this.reset();
            loadProducts();
            alert('Product added successfully!');
        });

        // Edit Modal
        const modal = document.getElementById('editModal');
        const closeBtn = document.querySelector('.close');

        closeBtn.onclick = function() {
            modal.style.display = 'none';
        }

        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }

        function openEditModal(id) {
            const products = JSON.parse(localStorage.getItem('products')) || [];
            const product = products.find(p => p.id === id);
            
            if (product) {
                document.getElementById('editProductId').value = product.id;
                document.getElementById('editProductName').value = product.name;
                document.getElementById('editProductCode').value = product.code;
                document.getElementById('editProductPrice').value = product.price;
                document.getElementById('editProductCategory').value = product.category;
                document.getElementById('editProductQuantity').value = product.quantity;
                document.getElementById('editProductDescription').value = product.description || '';
                
                modal.style.display = 'block';
            }
        }

        document.getElementById('editForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const id = parseInt(document.getElementById('editProductId').value);
            let products = JSON.parse(localStorage.getItem('products')) || [];
            
            const productIndex = products.findIndex(p => p.id === id);
            if (productIndex !== -1) {
                products[productIndex] = {
                    id: id,
                    name: document.getElementById('editProductName').value,
                    code: document.getElementById('editProductCode').value,
                    price: parseFloat(document.getElementById('editProductPrice').value),
                    category: document.getElementById('editProductCategory').value,
                    quantity: parseInt(document.getElementById('editProductQuantity').value),
                    description: document.getElementById('editProductDescription').value,
                    dateAdded: products[productIndex].dateAdded
                };
                
                localStorage.setItem('products', JSON.stringify(products));
                modal.style.display = 'none';
                loadProducts();
                alert('Product updated successfully!');
            }
        });

        function deleteProduct(id) {
            if (confirm('Are you sure you want to delete this product?')) {
                let products = JSON.parse(localStorage.getItem('products')) || [];
                products = products.filter(p => p.id !== id);
                localStorage.setItem('products', JSON.stringify(products));
                loadProducts();
                alert('Product deleted successfully!');
            }
        }

        function loadProducts() {
            const searchTerm = document.getElementById('searchProduct').value.toLowerCase();
            let products = JSON.parse(localStorage.getItem('products')) || [];
            
            if (searchTerm) {
                products = products.filter(p => 
                    p.name.toLowerCase().includes(searchTerm) ||
                    p.code.toLowerCase().includes(searchTerm)
                );
            }

            const container = document.getElementById('productsList');

            if (products.length === 0) {
                container.innerHTML = '<p class="empty-message">No products found. Add one using the form above.</p>';
                return;
            }

            let html = `
                <table class="products-table">
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            products.forEach(product => {
                html += `
                    <tr>
                        <td>${product.code}</td>
                        <td>${product.name}</td>
                        <td>${product.category}</td>
                        <td>$${product.price.toFixed(2)}</td>
                        <td>${product.quantity}</td>
                        <td>
                            <button class="btn-small btn-edit" onclick="openEditModal(${product.id})">Edit</button>
                            <button class="btn-small btn-delete" onclick="deleteProduct(${product.id})">Delete</button>
                        </td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        document.getElementById('searchProduct').addEventListener('input', loadProducts);
    </script>
</body>
</html>
